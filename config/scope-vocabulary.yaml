# Existing scope patterns from 23 approved rules — used as few-shot examples for LLM
# Categories derived from RFC 5.2 analysis of approved Rule Units
patterns:
  principle:
    - "금품류 제공 금지 원칙"
    - "기부행위 허용 원칙"
    - "견본품 제공 일반 원칙"
    - "간주 제공 원칙"
    - "직접 기부 금지"
  condition:
    - "기부행위의 목적 제한 (의학적, 교육적, 자선적)"
    - "사회통념상 인정 범위 내 기부"
    - "사회통념상 정상적 상관례"
    - "제6조~제17조 예외 허용 범위"
    - "법령 기반 예외"
    - "기부행위 금지 조건"
    - "지정기부 예외 절차"
  target:
    - "보건의료인 정의"
    - "의료기관 개설자"
    - "의료기관 종사자"
    - "사업자 및 판매업자의 의료기관·보건의료인 대상 금품류 제공 금지"
    - "보건의료인의 가족·친인척"
    - "의료기관 등과 특수관계에 있는 개인·회사·단체"
    - "금품류 제공 제한 대상"
  mechanism:
    - "본사·지사·관계사를 통한 금품류 제공"
    - "위탁 판매"
    - "마케팅 대행사"
    - "협회를 통한 기부대상 선정 의뢰"
    - "기부금품 회계처리 시 증빙 의무"
    - "기부 후 신고 의무"
    - "서면 평가조건 명시 및 인수증"
  threshold:
    - "1~2개 또는 평가 필요 최소 수량"
    - "최소포장단위"
    - "최소수량 및 최소기간 초과 금지"
    - "최소 기간 1개월 이내 제한"
    - "기부금품 전달 완료 후 10일 이내 협회 통보"
