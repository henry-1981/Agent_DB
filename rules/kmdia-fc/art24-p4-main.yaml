rule_id: kmdia-fc-art24-p4-main
text: '④ 위원회는 제1항에 의한 경고 등의 조치를 받은 사업

  자가 이에 따르지 않는다고 인정될 때에는 공정거래위

  원회와 보건복지부에 필요한 조치를 의뢰할 수 있다.'
