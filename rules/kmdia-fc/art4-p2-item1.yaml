rule_id: kmdia-fc-art4-p2-item1
text: '1. 사업자는 매분기 마지막 월(3,6,9,12월)에 차차 분

  기에 집행할 기부대상의 선정을 협회 의료기기공정경

  쟁규약심의위원회홈페이지(이하 ‘홈페이지’라 한다)를

  통하여 협회에 의뢰하여야 한다.'
