rule_id: kmdia-fc-art18-p2-main
text: '② 위원회는 위원장 1인을 포함한 10인으로 구성하

  되, 다음 각 호에 해당하는 5인이 위원으로 포함되어

  야 한다. 간사는 협회 상근자중 협회장이 위촉한다.








































  는 발행주체, 발행부수, 광고효과 등을 고려하여 아래

  의 표의 금액 한도 내에서 적정금액을 지급하여야 한

  다. 단, 전자문서의 내용과 형식은 종이문서 형태의 인

  쇄물이나 교육자료의 수준과 동등하여야 하고, 기존내

  용을 반복해서 사용하거나 간단한 수정을 통해 작성한

  것은 전자문서에 따른 광고비를 지급할 수 없다. 인쇄

  물과 전자문서에 광고하는 경우, 인쇄 광고매체의 비

  용만 지급할 수 있다.

  (단위 : 만원)

