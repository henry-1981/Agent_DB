rule_id: kmdia-fc-art4-p4-item4
text: '4. 기부대상을 통보받은 사업자가 협회 결정에 이의가

  있는 경우, 통보받은 날로부터 5일 이내에 기부대상

  선정의뢰 신청을 철회할 수 있다.'
