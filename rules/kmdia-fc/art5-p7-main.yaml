rule_id: kmdia-fc-art5-p7-main
text: '⑦ 규약 제8조 제4항에 의거하여 사업자가 국내 개최

  국제학술대회를 지원하고자 하는 경우 사업자는 학술

  대회 개최일 30일 전에 홈페이지를 통하여 신고서 및

  해당 학술대회가 국제학술대회임을 증명하는 증빙자

  료를 첨부하여 협회에 신고하여야 한다. 단, 협회가 대

  한의사협회 등으로부터 국내에서 개최되는 국제학술

  대회의 명단을 제출받아 협회의 홈페이지에 게재한 학

  술대회를 사업자가 지원하고자 하는 경우에는 본 항의

  국제학술대회임을 증명하는 증빙자료의 첨부의무를

  적용하지 아니한다.


  32                2022 KMDIA 의료기기 리베이트 예방 및 공정거래를 위한 안내서

  의료기기 거래에 관한 공정경쟁규약 및 세부운용기준 개요                33'
