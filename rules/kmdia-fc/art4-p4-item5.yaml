rule_id: kmdia-fc-art4-p4-item5
text: '5. 다음 각 목의 경우 협회는 심의비 등을 반환하지 않

  는다.

  가. 심의완료 후 사업자가 기부대상 선정 신청을 철회

  하는 경우

  나. 심의결과 미승인 또는 부결되는 경우

  다. 규약 제7조 제1항 제3호에 따라 사업자가 기부금

  모집에 참여하여 협회로부터 최종 기부액을 통보받은

  후 철회하는 경우'
source_ref:
