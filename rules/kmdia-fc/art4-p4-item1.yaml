rule_id: kmdia-fc-art4-p4-item1
text: '1. 기부금액이 1억원 이하인 경우 심의비 또는 수수료

  (이하 ‘심의비등’이라 한다)는 기부금액의 1.5% (100

  원 이하 절삭)로 한다.'
