rule_id: kmdia-fc-art12-p3-main
text: '③ 의료기기 수입업자는 수입품목허가(신고)를 받은

  후 국내에 수입된 바 있는 의료기기에 관한 교육·훈련

  을 국외에서 실시할 경우 교육·훈련에 참가하는 보건

  의료인, 시술 및 진단관련 종사자에게 제②항에 따른

  지원을 할 수 없으며, 교육·훈련 개최 시 행사장소, 행

  사내용 및 개최방법 등이 불공정행위로 오해받지 않도

  록 유의해야 한다.'
