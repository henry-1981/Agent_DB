rule_id: kmdia-fc-art17-p4-item5
text: '5. 제4호의 보고를 받기 전에 보건의료인에게 보수 전

  액을 지급하여서는 아니되고, 보수를 줄 수 있는 사례

  보고서의 개수는 의료기기법 시행규칙 제10조에 따라

  제출하여야 하는 사례보고서의 최소 개수로 하되, 연

  구목적, 해외허가 또는 대외 등록 등을 위하여 특정품

  목에 대한 사례보고서가 필요한 경우에는 식품의약품

  안전처장이 정하여 고시하는 바에 따라 그 수를 증가

  시킬 수 있으며, 그 보수는 사회통념상 적정한 것이어

  야 한다.'
