rule_id: kmdia-fc-art3-p8-main
text: '⑧ “견본품”이라 함은 의료기기의 소개용 완제품을 말

  한다.








































  22                2022 KMDIA 의료기기 리베이트 예방 및 공정거래를 위한 안내서

  의료기기 거래에 관한 공정경쟁규약 및 세부운용기준 개요                23









































  교육 또는 의료기술의 안전하고 효과적인 사용에 대한

  훈련을 말한다.


  ⑬ “시장조사”라 함은 사업자가 시장에서의 소비자의

  요구를 포함하여 시장과 그 구성요소의 규모 및 특성

  에 대한 데이터를 수집하는 활동을 말한다.


  ⑭ “시판후조사”라 함은 품목허가를 받은 자가 「의료

  기기법」 제8조에 의한 재심사 대상 의료기기의 안전

  성·유효성에 관한 사항과 적정한 사용을 위해 필요한

  정보를 수집, 검토, 확인 또는 검증하기 위하여 실시하

  는 사용성적조사, 특별조사, 시판 후 임상시험 등 재심

  사 기간 중 실시하는 조사를 말한다.


  ⑮ “금품류”라 함은 방법의 여하를 막론하고 사업자가

  의료기관 등 또는 보건의료인에게 제공하는 물품, 금

  전, 기타 경제상의 이익으로서 다음 각호의 1을 포함

  하나 이에 한정하지 아니한다.'
