rule_id: kmdia-fc-art4-p1-main
text: '① 한국의료기기산업협회(이하 “협회”라 한다)는 본

  규약의 취지를 반영해 규약의 세부사항에 관하여 세부

  운용기준(이하 “운용기준”이라 한다)을 정할 수 있다.'
