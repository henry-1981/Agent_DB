rule_id: kmdia-fc-art6-p5-item5
text: '5. 해외에서 개최되는 학술대회 참가의 경우 현지 교

  통비는 공항-호텔간 왕복 교통비 및 학술대회 참석을


  34                2022 KMDIA 의료기기 리베이트 예방 및 공정거래를 위한 안내서

  의료기기 거래에 관한 공정경쟁규약 및 세부운용기준 개요                35

  경우에는 사업자는 해당 제품설명회 개최 40일 전에

  협회에서 정한 양식에 따라 구체적인 제품설명회계획

  서, 소요예산안 등 부속서류를 첨부하여 협회에 해당

  제품설명회 개최 승인을 신청하여 협회의 사전 승인을

  받아야 하며, 해당 제품설명회 종료 후 1개월 이내에

  해당 제품설명회의 비용결산 내역을 협회에 통보하여

  야 한다(협회는 사업자가 제품설명회를 적정하게 운영

  하였는지 확인하여야 한다). 그 이외의 제1항의 제품

  설명회의 경우에는 제품설명회 개최 1주일 전에 협회

  에서 정한 양식에 따라 협회에 신고하여야 한다.'
