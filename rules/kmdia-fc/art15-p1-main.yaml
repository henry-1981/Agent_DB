rule_id: kmdia-fc-art15-p1-main
text: '① 사업자는 식약처로부터 승인을 얻은 시판후조사 계

  획과 실시 기준에 따라 시판후조사를 수행하여야 하

  고, 다음 각 호의 원칙에 따라야 한다.'
