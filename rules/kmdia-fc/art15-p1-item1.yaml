rule_id: kmdia-fc-art15-p1-item1
text: '1. 시판후조사는 의료기기법령 및 식약청의 관련 규정

  에 근거하여 의학적 필요성이 인정되는 범위 내에서

  조사목적 및 조사내용에 비추어 적정한 증례수로 실시

  하여야 한다.'
