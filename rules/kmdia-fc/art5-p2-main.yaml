rule_id: kmdia-fc-art5-p2-main
text: '② 제1항에도 불구하고 사업자및 판매업자 등은 제1항 단서에 의거하여 허용되는 금품류 외에「의료법」 제23조의2 제2항, 보건복지부령「의료기기
  유통 및 판 매질서 유지에 관한 규칙」제2조와 관련하여 동 법령의 소관부서인 보건복지부의 유권해석을 통해 보건의료 인에게 제공할 수 있음이 확인된
  금품류를 예외적으로 보건의료인에게 제공할 수 있다.

  '
