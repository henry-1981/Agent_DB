rule_id: kmdia-fc-art5-p3-item2
text: '2. 사업자가 판매업자 등이나 마케팅 대행사가 의료기 관 등 또는 보건의료인에게 제공하는 것임을 인지할 수 있었음에도 고의 또는 중대한
  과실로 이를 방지하 지 아니한 경우에 사업자가 판매업자 등이나 마케팅 대행사에게 그 금품류를 제공하는 경우를 말한다.

  '
