rule_id: kmdia-fc-art4-p2-item2
text: '2. 협회는 의학·의료기기 연구기관 등을 대상으로 협

  회 홈페이지에 최소 15일간 모집공고를 하여 기부대

  상을 선정하고, 사업자의 심의 의뢰가 있은 날로부터

  30일 이내에 사업자에게 심의결과를 통보하여야 한

  다. 단, 부득이한 사유로 동 기간 내에 처리할 수 없을

  28                2022 KMDIA 의료기기 리베이트 예방 및 공정거래를 위한 안내서

  의료기기 거래에 관한 공정경쟁규약 및 세부운용기준 개요                29'
