rule_id: kmdia-fc-art13-p1-main
text: '① 사업자는 「의료기기법」제10조 제1항에 따라 식

  품의약품안전처장의 임상시험계획승인을 받은 경

  우 또는 임상시험심사위원회 (Institutional Review

  Board)의 임상시험 승인을 받은 경우에는 임상시험을

  실시하는데 필요한 수량의 임상시험용 의료기기를 보

  건의료인 또는 의료기관에 무료로 제공 또는 대여할

  수 있다. 이 경우 해당 의료기관에 설치된 관련 위원회

  의 사전 승인을 받은 비임상시험(동물시험, 실험실 시

  험 등)이 포함된다.'
