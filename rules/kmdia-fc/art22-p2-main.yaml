rule_id: kmdia-fc-art22-p2-main
text: '② 협회는 공정거래위원회 또는 보건복지부의 제1항

  의 자료제출 요청에 성실히 응하여야 한다.


  위가 조직적·의도적이거나 반복적·계속적이며 위반의

  내용과 정도가 명백하고 중대한 경우, 위법행위로 법

  적처분을 받을 수 있는 경우 또는 경징계 조치를 받고

  도 개선되지 않은 경우 등에 조치한다.'
