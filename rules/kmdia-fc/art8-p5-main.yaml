rule_id: kmdia-fc-art8-p5-main
text: '⑤ 사업자가 개별 의료기관을 방문하여 해당 의료기

  관 소속 보건의료인, 시술 및 진단 관련 종사자에게 교

  육·훈련을 실시하는 경우, 사업자는 참석자에게 식음

  료 및 자사의 회사명 또는 제품명이 기입된 소액의 판

  촉물을 제공할 수 있다. 다만, 식음료는 동일 보건의료

  인, 시술 및 진단관련 종사자에게 제10조 제4항의 제

  품설명회의 경우를 포함하여 월 4회를 초과하여 제공

  할 수 없다.'
