rule_id: kmdia-fc-art3-p2-item2
text: '2. 사업자가 판매업자 등이나 마케팅 대행사가 의료기

  관 등 또는 보건의료인에게 제공하는 것임을 인지할

  수 있었음에도 사업자가 판매업자 등이나 마케팅 대행

  사에게 그 금품류를 제공하는 경우'
