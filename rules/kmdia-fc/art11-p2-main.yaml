rule_id: kmdia-fc-art11-p2-main
text: '② 사업자는 다음 각 호의 원칙에 근거하여 국내에서

  복수의 의료기관을 대상으로 실시하는 교육·훈련 및

  국내에 수입되지 않은 자사의 의료기기의 기술습득·향

  상을 위하여 실시하는 국외 교육·훈련에 참가하는 의'
