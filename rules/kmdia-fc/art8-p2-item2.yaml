rule_id: kmdia-fc-art8-p2-item2
text: '2. 협회는 학술대회계획의 적정성을 검토하여 그 검토

  결과에 따라 공지를 통해 지원을 희망하는 사업자를

  모집하고 모집결과를 해당 기관·단체 및 지원 사업자

  에게 통지한다.'
