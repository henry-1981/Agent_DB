rule_id: kmdia-fc-art13-p1-item2
text: '2. 보건의료인이 독자적으로 제작한 광고매체 또는 의

  료기관이 제작한 광고매체(기관지, 연구잡지 등)로서

  배포 대상이 광고매체를 제작한 의료기관에 소속된 보

  건의료인 및 당해 의료기관 종사자·이용객에 한하는

  경우는 사업자가 의료기관 등에 광고비를 지급할 수

  있는 광고매체라고 보지 않는다.'
