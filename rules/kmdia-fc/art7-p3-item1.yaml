rule_id: kmdia-fc-art7-p3-item1
text: '1. 수회 반복적인 사용이 가능한 제품의 평가 기간을

  포함한 평가조건은 사전에 서면으로 명시되어야 하며,

  사업자 및 판매업자 등은 의료기관으로부터 해당 인수

  증을 받아야 한다.'
