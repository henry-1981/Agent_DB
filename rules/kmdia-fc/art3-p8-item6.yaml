text: '6. 할인, 할증, 판매장려금 등(다만, 의료법 시행규칙,

  의료기기법 시행규칙에서 제공이 허용되는 경제적 이

  익 등에 해당하는 “대금결제조건에 따른 비용할인”, “

  신용카드 또는 직불카드 사용에 따른 적립점수”는 제

  외한다)'
