rule_id: kmdia-fc-art5-p3-item1
text: '1. 사업자가 국내외 본사 또는 지사 또는 그 관계사, 판매업자 등이나 마케팅 대행사(사업자의 위탁을 받아 의료기기의 판촉활동을 하는
  회사)에게 금품류를 제공 하면서 이를 의료기관 등 또는 보건의료인에게 제공하 도록 요구하는 경우

  '
