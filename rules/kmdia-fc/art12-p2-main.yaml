rule_id: kmdia-fc-art12-p2-main
text: '② 규약 제11조 제2항에 따른 수입업자의 국외 교육·

  훈련은 당해 의료기기에 대한 식품의약품안전처장의

  변경허가 등 사용방법 등의 변화가 있는 경우 이외에

  는 반복될 수 없다.'
