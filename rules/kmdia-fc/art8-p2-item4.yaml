rule_id: kmdia-fc-art8-p2-item4
text: '4. 사업자는 해당 학술대회 종료 후 1개월 이내에 학

  술대회 지원내역을 협회에서 정한 양식에 따라 협회에

  통보하며, 협회는 사업자가 학술대회 지원을 적정하게

  하였는지 확인한다.'
