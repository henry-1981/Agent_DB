rule_id: kmdia-fc-art12-p6-main
text: '⑥ 사업자가 국내의 복수의료기관을 대상으로 숙박을

  제공하지 않고 실시하는 교육·훈련의 경우에는 홈페이

  지를 통하여 행사프로그램, 예산안 등 증빙자료를 첨

  부하여 개최 1주일 전에 협회에 신고하여야 한다.'
