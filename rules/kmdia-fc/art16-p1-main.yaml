rule_id: kmdia-fc-art16-p1-main
text: '① 사업자는 의료기기의 임상적 특성, 질병, 또는 그

  외 상당한 관심이 있는 보건의료 영역에 대하여 의학

  적으로 중요한 정보를 확보하려는 목적 하에 의료기

  기 법령 및 식약처 관련 규정에 근거하여 임상활동을

  계획할 수 있으며, 다음 각 호의 원칙과 기준에 따라야

  한다.


  1.「의료기기법」 제10조 제1항에 따라 식품의약품안전

  처장의 임상시험계획 승인을 받은 경우 또는 임상시험

  심사위원회(Institutional Review Board)의 임상시

  험 승인을 받은 경우에만 허용된다. 다만, 비임상시험

  (동물시험, 실험실 시험 등)의 경우 해당의료기관에 설

  치된 관련 위원회의 사전 승인을 받은 임상활동이 포

  함된다.'
