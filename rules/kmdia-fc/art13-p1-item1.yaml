rule_id: kmdia-fc-art13-p1-item1
text: '1. 사업자가 의료기관 등에 광고비를 지급할 수 있는

  광고매체는 (i) 의료기관 등이 질병의 치료, 예방, 교육

  을 위해 작성하여 다수 의료기관의 다수 보건의료인에

  게 배포, 전시하는 인쇄물 또는 이에 준하는 형태의 전

  자문서, (ii) 학술목적으로 설립된 의학 관련 단체(이하

  ‘학회 등’이라 한다)가 운영하는 웹사이트 및 (iii) 학회

  등이 보건의료인 및(또는) 일반인을 대상으로 배포하

  는 교육자료(전자문서의 형태로 된 교육자료를 포함한

  다)에 한한다.'
