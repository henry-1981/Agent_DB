rule_id: kmdia-fc-art7-p4-main
text: '④ 규약 제10조 제2항 후단 제품설명회의 경우, 사업

  자는 홈페이지를 통하여 행사프로그램, 예산안 등 증

  빙자료를 첨부하여 개최일 1주일 전까지 협회에 신고

  하여 한다.'
