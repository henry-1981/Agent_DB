rule_id: kmdia-fc-art7-p3-main
text: '③평가용 제품 중 수회의 반복적 사용이 가능한 제품

  은 제1항 내지 제2항의 기준을 준수하되 다음 각 호에

  따라 적절한 평가를 위하여 합리적으로 필요한 최소한

  의 기간(1개월이내) 동안만 제공되어야 한다.'
