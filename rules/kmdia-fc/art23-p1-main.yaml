rule_id: kmdia-fc-art23-p1-main
text: '① 위원회는 제19조 제3항 및 제20조 제1항 내지 제3

  항에 의한 조치를 취하고자 할 경우에는 취해야 할 조

  치내용(이하 “결정안”이라 한다)을 작성하여 이를 당

  해 사업자에게 통지하여야 한다.'
