rule_id: kmdia-fc-art13-p3-main
text: '③ 사업자가 보건의료인에 자문을 의뢰하는 경우 사

  업자는 사전에 해당 보건의료인이 수행할 자문업무의

  내용과 자문료를 명시한 서면계약을 당해 보건의료인

  과 체결하여야 하고 이에 따라 지급하는 자문료는 보

  건의료인 1인당 1회 50만원 및 연간 300만원이내에

  서 지급해야 한다. 단, 의료기관을 방문하여 간단한

  서식으로 수행하는 자문은 허용되지 아니하고 규약'
