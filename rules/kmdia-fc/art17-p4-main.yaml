rule_id: kmdia-fc-art17-p4-main
text: '④ 사업자는 보건의료인에게 자신의 전시관을 찾아주

  는 것에 대한 보상을 제공하여서는 아니된다. 단, 소액

  의 기념품 또는 판촉물은 제공할 수 있다.'
