rule_id: kmdia-fc-art15-p1-item4
text: '4. 사업자가 보건의료전문가에게 강연 또는 자문을 의

  뢰하는 경우 사전에 수행할 용역의 내용과 지급 금액

  을 명시한 서면계약을 체결해야 한다.'
