rule_id: kmdia-fc-art5-p7-item4
text: '4. 학술대회 참가지원이 여행·관광·여가활동 지원 등

  향응이나 접대와 결부되어서는 아니되고, 보건의료인

  의 동반자에 대한 지원은 허용되지 아니한다.'
