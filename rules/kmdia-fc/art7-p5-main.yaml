rule_id: kmdia-fc-art7-p5-main
text: '⑤ 규약 제10조 제4항의 경우 사업자는 각 보건의료

  인에 대하여 1일 10만원 이내의 식음료(월 최대 4회)

  및 자사의 회사명 또는 제품명이 기입된 1만원 이하의

  판촉물을 제공할 수 있다. 단, 식음료는 동일 보건의료

  인에게 제10조의 교육 또는 훈련의 경우를 포함하여

  월 4회를 초과하여 제공할 수 없다.'
