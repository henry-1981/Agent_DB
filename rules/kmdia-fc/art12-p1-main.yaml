rule_id: kmdia-fc-art12-p1-main
text: '① 사업자는 보건의료인에 대한 판촉목적으로 강연 또

  는 자문을 의뢰하고 강연료 또는 자문료를 지급하여서

  는 아니되며, 의학·의료기기에 관한 전문적인 지식과

  경험을 가진 보건의료인의 의학·의료기기에 관한 전문

  적인 지식과 경험이 필요하여 강연 또는 자문을 의뢰하

  는 경우에는 다음 각 호의 원칙과 기준에 따라야 한다.'
