rule_id: kmdia-fc-art8-p1-main
text: '① 사업자는 다음 각 호의 1의 기관ㆍ단체가 주관하여

  국내에서 개최하는 학술대회의 개최 및 운영을 기부,

  식음료 제공, 기념품 제공, 부스 임대, 광고 등 다양한

  수단을 통해 지원할 수 있다.


  1.「의료법」제28조 제1항에 따른 의사회ㆍ치과의사

  회ㆍ한의사회, 같은 법 제52조 제1항에 따른 의료기

  관 단체 및 이들 협회가 승인·인정한 학회(해외학회 포

  함), 학술기관·단체 또는 연구기관·단체'
