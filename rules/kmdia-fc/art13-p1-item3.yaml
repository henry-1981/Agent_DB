rule_id: kmdia-fc-art13-p1-item3
text: '3. 사업자는 제1호 (ii)의 학회 등이 운영하는 웹사이트

  광고의 경우 연 1,000만원의 한도 내에서 월 100만원

  까지 광고비를 지급할 수 있고, 그 외의 제1호 (i), (iii)

  에서 규정한 인쇄 또는 전자문서 광고매체의 경우에


  42                2022 KMDIA 의료기기 리베이트 예방 및 공정거래를 위한 안내서

  의료기기 거래에 관한 공정경쟁규약 및 세부운용기준 개요                43


  제3장 규약의 운용'
