rule_id: kmdia-fc-art16-p4-main
text: '④ 위원회 및 실무단은 업무와 관련된 사항을 위원회

  또는 실무단 업무 이외의 목적으로 사용하거나 위원회

  의 결정없이 외부로 발설해서는 아니 된다.'
