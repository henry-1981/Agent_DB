rule_id: kmdia-fc-art10-p1-item1
text: '1. 여비, 숙박, 식음료 및 기념품의 제공대상은 제품설

  명회와 직접 관련이 있는 보건의료인에 한하고, 보건

  의료인의 동반자에 대한 제공은 허용되지 아니한다.'
