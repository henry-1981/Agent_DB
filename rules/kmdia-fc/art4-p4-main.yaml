rule_id: kmdia-fc-art4-p4-main
text: '④ 제1항 제2호 내지 제4호에도 불구하고 사업자가

  자선적 목적으로 의료기관 등(의료기관과 의학·의료기

  기 연구기관)에 의료기기를 기부하고자 하는 경우에는

  사업자는 협회에서 정한 양식상에 기부대상, 기부목

  적, 기부규모 등을 기재하여 협회에 사전 신고하고 기

  부대상에 직접 기부할 수 있다. 이 경우에도 사업자는

  같은 항 제1호 가.목 내지 라.목, 제5호 및 제6호의 원

  칙을 따라야 하며, 협회는 사업자의 기부행위가 적정

  하게 이루어졌는지 확인하여야 한다.

  때에는 미리 사업자에게 이를 알려주어야 한다.'
