rule_id: kmdia-fc-art17-p1-main
text: '① 사업자는 보건의료인을 대상으로 의료기기 관련 각

  종 지식과 경험을 널리 알림으로써 의학적 지식을 확

  대·보급하고 환자의 이익을 극대화하기 위한 목적으로

  전시 또는 광고할 수 있다. 다만, 사업자는 전시 또는

  광고의 실시 내역을 협회에서 정한 양식에 따라 매분

  기별로 협회에 신고하여야 한다.'
