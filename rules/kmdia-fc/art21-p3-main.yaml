rule_id: kmdia-fc-art21-p3-main
text: '③ 위약금을 부과받은 사업자는 결정안을 통지받은 날

  로부터 30일 이내에 위약금을 납부하여야 한다. 단,

  사업자가 결정안에 이의신청을 한 경우에는 재심의하

  여 최종 결정안을 통지받은 날로부터 30일 이내에 위

  약금을 납부한다.'
