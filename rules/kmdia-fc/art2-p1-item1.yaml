rule_id: kmdia-fc-art2-p1-item1
text: '1. 보건의료 관계법령에서 자격 또는 면허를 정한 보

  건의료인

  가. 의료법: 의사, 치과의사, 한의사, 조산사, 간호사

  나. 의료기사등에관한법률: 임상병리사, 방사선사, 물

  리치료사, 작업 치료사, 치과기공사 및 치과위생사, 의

  무기록사, 안경사

  다. 기타 법률: 위생사, 1급·2급 응급구조사, 의지보조

  기기사, 보건교육사, 의료보호사, 간호조무사, 접골사,

  침사 및 구사, 병원에 근무하는 약사 및 한약사

  라. 나목 내지 다목에 의한 보건의료인은 의료기관의

  개설자 또는 종사자인 경우에 한함'
