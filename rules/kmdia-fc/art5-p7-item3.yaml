rule_id: kmdia-fc-art5-p7-item3
text: '3. 사업자는 지원하려는 학술대회만을 지정하여 협회

  에 기탁하는 방식으로 보건의료인을 지원하여야 하며,

  협회를 통해 지원하는 것 외에 학술대회를 주관하는

  기관·단체나 그 관계자, 학술대회 참가자 개인에 대한

  직접적인 지원은 허용되지 아니한다.'
