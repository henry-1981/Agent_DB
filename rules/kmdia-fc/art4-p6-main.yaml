rule_id: kmdia-fc-art4-p6-main
text: '⑥ 규약 제7조 제3항과 관련하여 협회는 의학·의료기

  기 연구기관 등으로부터 해당 사업종료 후 3개월 이내

  에 해당사업에 대한 총 수입 및 총 지출내역이 포함된

  결산보고서와 지출을 증명할 수 있는 영수증사본을 제

  출받아 기부행위가 적정하게 집행되었는지 홈페이지

  를 통하여 집행신고서를 확인하여야 한다.'
