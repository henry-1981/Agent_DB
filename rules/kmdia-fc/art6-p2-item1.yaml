rule_id: kmdia-fc-art6-p2-item1
text: '1. 해당 의료기기에 대하여 보건의료인 및 환자의 인지도 개선을 위한 시연 목적으로만 사용할 수 있도록 하는 견본품을 제공하려는 경우,
  제품의 포장 및 첨부 문서에 "인체사용금지" 또는 그 밖에 환자에 대하여 사용이 금지된다는 사항을 표기하여 제공하여야 한다.

  '
