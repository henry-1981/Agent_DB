rule_id: kmdia-fc-art8-p6-main
text: '⑥ 사업자는 국내·외 교육·훈련 경비의 회계처리 시 관

  련 교육·훈련의 일시·장소·내용, 참석자명단, 지출비용

  등에 대한 구체적인 증빙자료를 첨부하여야 한다.'
