rule_id: kmdia-fc-art5-p6-item2
text: '2. 규약 제8조 제4항에 따른 국내개최 국제학술대회의

  경우, 학술대회 주관자는 규약 제8조 제6항에 따라 반

  환해야 할 잔액을 해당 학술대회를 지원한 각 사업자

  가 차지하는 지원금 비율에 따라 환불하여야 한다.'
