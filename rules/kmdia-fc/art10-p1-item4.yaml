rule_id: kmdia-fc-art10-p1-item4
text: '4. 응답시간이 30분 이상 소요되는 시장조사의 경우에

  한하여 보건의료인 1인당 10만원 한도 내에서 적정수

  준의 답례비를 제공할 수 있다.'
