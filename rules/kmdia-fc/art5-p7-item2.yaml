rule_id: kmdia-fc-art5-p7-item2
text: '2. 보건의료인에 대한 지원 내용은 발표자, 좌장, 토론

  자가 학술대회 주최자로부터 지원받는 실비의 교통비,

  등록비, 식대, 숙박비에 한한다.'
