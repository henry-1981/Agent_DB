rule_id: kmdia-fc-art16-p2-main
text: '② 위원회 또는 실무단에 소속한 사업자와 관계된 안

  건을 다룰 경우, 그 위원 또는 실무단원은 해당 안건에

  관한 심의 및 의결, 조사 등에 참여할 수 없다. 이 경우

  당해 위원회의 재적수는 본 항에 따라 관련 위원수를

  제외한 전체 위원수로 한다.'
