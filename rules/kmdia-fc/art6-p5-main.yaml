rule_id: kmdia-fc-art6-p5-main
text: '⑤ 규약 제9조 제2항 제2호의 실비상당의 교통비,

  등록비, 식대, 숙박비는 다음 각 호와 같으며, 금액기

  준은 ''VAT포함‘을 원칙으로 한다(이 기준에서 동일

  적용).'
