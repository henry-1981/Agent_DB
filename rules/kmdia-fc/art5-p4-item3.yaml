rule_id: kmdia-fc-art5-p4-item3
text: '3. 학술대회 주관기관 또는 단체의 사무국 직원 인건

  비, 집기구입비용, 기타 사무국 운영비용 등 해당 학술

  대회와 직접 관련되지 않은 행정비용과 학술대회 중

  규약 제3조 제8항의 학술대회의 정의에 해당하지 아

  니하는 비학술적 행사내용이 포함된 경우 이에 소요되

  는 비용은 지출에 포함하지 아니한다.'
