rule_id: kmdia-fc-art18-p2-item5
text: '5. 부스비는 학회 또는 의학 관련 학술기관·단체나 연

  구기관·단체가 주최하는 학술대회의 경우 학술대회당

  1부스 200만원을 기준으로 하며, 사업자는 학술대회

  의 성격, 규모, 참가인원 등에 따라 1부스 사용료로 최

  대 300만원까지 지급할 수 있다. 의료기관이 주최하

  는 학술대회의 경우, 부스비는 학술대회당 1부스 50만

  원을 기준으로 하며, 사업자는 학술대회의 성격, 규모,

  참가인원 등에 따라 1부스 사용료로 최대 100만원까

  지 지급할 수 있다.'
