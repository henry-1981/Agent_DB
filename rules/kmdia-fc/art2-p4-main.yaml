rule_id: kmdia-fc-art2-p4-main
text: '④ 회계기록 기타 재무관리는 관련법령과 일반적으로

  인정되는 회계원칙 등에 따라 사실에 근거하여 정확하

  고 투명하게 기록·관리하여야 한다.'
