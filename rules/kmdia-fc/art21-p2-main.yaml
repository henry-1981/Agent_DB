rule_id: kmdia-fc-art21-p2-main
text: '② 제1항의 규정에 의하여 결정안을 통지받은 사업자

  는 통지받은 날로부터 10일 이내에 이의신청하거나

  조치내용의 수락의사를 위원회에 통지하여야 한다.'
