rule_id: kmdia-fc-art5-p3-item3
text: '3. 경비 지급과 관련한 자료 일체를 성실히 관리하고,

  지원 사업자의 요청이 있는 경우 언제라도 관련 자료

  를 열람·복사할 수 있게 하여야 한다.

  경우 대회 종료 후 3월내에 기부한 사업자에게 환불하

  여야 한다.'
