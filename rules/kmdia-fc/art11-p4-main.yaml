rule_id: kmdia-fc-art11-p4-main
text: "④ 지출보고서와 관련 장부 및 근거자료의 제출 요구를 따르지 않은 경우\n(시행일 : 2022. 1. 21.)\n(시행일 : 2022.\
  \ 1. 21.)\n의약품·의료기기 영업대행사도 의료인 등에게 의약품·의료기기 판매촉진\n목적으로 경제적 이익등을 제공하여서는 안되며, 위반시\
  \ 관련 법령에\n따라 처벌될 수 있습니다.\n* 영업대행사란? 의약품 공급자(의료기기 제조업자등)로부터 의약품(의료기기)의 판매\n(또는 임대)촉진업무를\
  \ 위탁받은 자(소위 “CSO”;Contracts Sales Organization)\n특히, 상기 개정법이 시행되기 전이라도 의약품·의료기기\
  \ 영업 대행사가\n의료인 등에 불법 리베이트 제공한 경우, 업무 위탁 업체와 함께 형법상\n공동정범 규정에 따라 처벌될 수 있으므로 주의하여\
  \ 주시기 바랍니다.\n\x15\n\n116                2022 KMDIA 의료기기 리베이트 예방 및 공정거래를 위한 안내서\n\
  의료기기 거래에 관한 공정경쟁규약 및 세부운용기준 개요                117\n\e\x1A\x19\x18\x17\x16\x15\x14\
  \x13\x12\x11\x10\x0F\x14\x0E\r\x14\x15\n의약품·의료기기 영업대행사가 의료인 등에게 허용된 경제적 이익등을\n제공한\
  \ 경우에도 그 내역을 작성하고, 관련 근거자료와 함께 5년간 보관\n하여야 합니다.\n(적용일 : 2023 .1. 1~)*\n\x13\x12\x11\
  \x10\x0F\x14\n\e\x14\b\x14\a\x06\x14\x05\x04\n의약품 공급자, 의료기기 제조업자등, 의약품·의료기기 영업 대행사가\
  \ 작성한\n지출보고서에 대한 실태조사·공표가 시행될 예정입니다.\n* 지출보고서 실태조사에 대한 시행규칙이 개정 중에 있으며 적용일 및 내용은\
  \ 개정 과정에서 변경될\n수 있음\n(적용일 : 2023 .1. 1~)*\n\x13\x12\x11\x10\x0F\x14\x05\x03\n또한,\
  \ 의약품 공급자, 의료기기 제조업자등, 의약품·의료기기 영업대행사가\n작성한 지출보고서에 대한 공개가 시행될 예정 입니다.\n영업대행사의 지출보고서\
  \ 작성, 지출보고서 실태조사 및 결과 공포 관련 시행일은 ’22.1.21.이고\n지출보고서 공개 관련 시행일은 ’23.7.21.이나, 약사법\
  \ 부칙 제6조, 의료기기법 부칙 제2조의\n적용례에 따라 「약사법」 제47조의2 및 「의료기기법」 제13조의2의 개정규정은 시행일이 속하는\n\
  회계연도의 다음 회계연도부터 적용됩니다.\n*\n상기 적용날짜는 회계연도 시작이 1월1일인 경우를 예시로 작성하였으며, 업체의 회계연도에 따라\n\
  구체적인 적용날짜는 달라질 수 있습니다.\n*\n(적용일 : 2024 .1. 1~)*\n\e\x1A\x19\x19\x1D\x18\x17\x16\x15\
  \n\x14\x13\x18\x12\x11\x18\x10\x0F\x1E\x0E\x18\n\e\x1A\x19\x18\x1A\x17\x16\x1A\x15\
  \x14\n의약품·의료기기\n리베이트 근절 관련 제도\n약사법·의료기기법 개정\n(2021.7.20.)에 따라 변경되는\n\n2022 KMDIA\
  \ 의료기기\n리베이트 예방 및\n공정거래를 위한 안내서"
