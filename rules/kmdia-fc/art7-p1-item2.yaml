rule_id: kmdia-fc-art7-p1-item2
text: '2. 사업자는 기부행위 전에 협회에서 정한 양식상에 기부목적, 기부규모 등을 기재하여 기부금품을 전달할 의학·의료기기 연구기관 등(이하
  "기부대상"이라 한다)의 선정을 협회에 의뢰하고, 이후 협회의 결정에 따라 기부대상에 직접 기부한다.

  '
