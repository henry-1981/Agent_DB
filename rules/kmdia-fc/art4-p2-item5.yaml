rule_id: kmdia-fc-art4-p2-item5
text: '5. 사업자는 기부금품 전달이 완료된 후 기부행위의

  일자·대상·목적·규모 등 기부 관련 사실을 협회에서 정

  한 양식에 따라 기부금품 전달일 기준 10일 이내에 협

  회에 통보하여야 한다.'
