rule_id: kmdia-fc-art12-p1-item1
text: '1. 보건의료인에 대한 강연 또는 자문의 요청은 제10

  조에 의한 제품설명회 및 제11조에 의한 교육·훈련의

  경우와 회원사 소속 임직원에 대한 자문 및 교육·훈련

  등 의학적, 전문적 정보습득의 목적에서 그 필요성이

  객관적으로 인정될 수 있는 경우로 한정되어야 한다.

  료기관 소속 보건의료인, 시술 및 진단 관련 종사자에

  게 사회통념상 허용되는 범위 내에서 실비 상당의 여

  비, 숙박, 식음료 및 기념품을 제공할 수 있다. 다만,

  학술대회 중 개최되는 교육·훈련은 학술대회의 일부로

  보며 이에 대한 지원은 제8조 및 제9조에 따른다.'
