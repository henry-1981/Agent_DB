rule_id: "kmdia-fc-art7-1"

text: >
  제7조 (기부행위)
  ① 사업자는 다음 각 호의 원칙에 근거하여 사회통념상 인정되는 범위 내에서
  의학·의료기기 연구기관 등에 의학적, 교육적, 자선적 목적으로 기부행위를 할 수 있다.

  1. 다음 각 목에 해당하는 기부행위는 허용되지 아니한다.
    가. 기부하는 사업자의 의료기기에 대한 채택 등 거래와 관련한 이익이 약속되어 있는 경우
    나. 사업자가 의료기기에 대한 채택 등 거래에 대한 영향을 고려하여
        의학·의료기기 연구기관 등의 기부요청에 응하는 경우
    다. 사회통념상 의학·의료기기 연구기관 등이 자신의 부담으로 지불해야 하는 것으로
        인정되는 부동산·비품구입, 시설증·개축, 경영자금보전 등에 사용되는 자금에 충당되는 경우
    라. 정당한 이유없이 동일한 의학·의료기기 연구기관 등에
        반복적·지속적으로 기부금품을 제공하는 경우

  2. 사업자는 기부행위 전에 협회에서 정한 양식상에 기부목적, 기부규모 등을 기재하여
  기부금품을 전달할 의학·의료기기 연구기관 등(이하 "기부대상"이라 한다)의 선정을
  협회에 의뢰하고, 이후 협회의 결정에 따라 기부대상에 직접 기부한다.

  3. 제2호에도 불구하고, 사업자는 의학·의료기기 연구기관 등이 협회에 학술상 시상,
  캠페인 등 사업을 실시하기 위해 기부를 요청하는 경우 다음 각 목의 절차에 따라
  기부대상에 직접 기부한다.
    가. 의학·의료기기 연구기관 등이 협회에서 정한 양식상에 사업명, 사업개요,
        기부요청금액 등을 기재하고 구체적인 사업계획서, 소요예산안 등 부속서류를
        첨부하여 협회에 기부요청을 한다.
    나. 협회는 사업계획의 적정성을 검토하여 그 검토결과에 따라 공지를 통해
        기부를 희망하는 사업자를 모집하고 모집결과를 해당 기부대상 및
        기부할 사업자에게 통지한다.
    다. 사업자는 협회의 통지에 따라 기부대상인 해당 의학·의료기기 연구기관 등에
        직접 기부한다.

  4. 사업자는 제2호 내지 제3호에 따라 기부하는 것 이외에는 의학·의료기기 연구기관
  등이나 보건의료인에 대한 직접적인 기부는 허용되지 아니한다.

  5. 사업자는 기부금품 전달이 완료된 후 기부행위의 일자·대상·목적·규모 등
  기부 관련 사실을 협회에서 정한 양식에 따라 기부금품 전달일 기준 10일 이내에
  협회에 통보하여야 한다.

  6. 사업자는 기부금품의 회계처리 시 기부행위의 일자·대상·목적·규모 등에 대한
  구체적인 증빙자료를 첨부하여야 한다.

