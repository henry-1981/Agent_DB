rule_id: kmdia-fc-art10-p1-main
text: '① 사업자는 다음 각 호의 원칙에 근거하여 자신이 개

  최하는 복수의 의료기관을 대상으로 하는 제품설명회

  에 참가한 보건의료인에게 사회통념상 허용되는 범위

  내에서 실비 상당의 여비, 숙박, 식음료 및 기념품을

  제공할 수 있다. 다만, 학술대회 중 개최되는 제품설명

  회는 학술대회의 일부로 보며 따라서 이에 대한 지원

  은 제8조 및 제9조에 따른다.'
