rule_id: kmdia-fc-art3-p9-main
text: '⑨ “기부행위”라 함은 환영금품, 협찬금품, 찬조금품,

  원조금품 등 명칭 여하에 관계없이 사업자가 의료기

  관, 학교, 학술·연구 또는 산학협력을 직접 수행하는

  기관이나 단체 등(이하 “의학·의료기기 연구기관 등”

  이라 한다)에 무상으로 금품류를 제공하는 행위를 말

  한다.'
