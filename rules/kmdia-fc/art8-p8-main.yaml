rule_id: kmdia-fc-art8-p8-main
text: '⑧ 의료기기 제조업자가 외국에서 복수의 외국 의료

  기관에 소속한 보건의료인을 대상으로 자사 의료기기

  에 대한 정보제공을 목적으로 주최하는 제품설명회와

  시술 및 진단기술의 습득ㆍ향상을 위하여 실시하는 교

  육ㆍ훈련에 강연자로 참석하는 보건의료인에게는 사

  회통념상 허용되는 범위 내에서 실비 상당의 여비, 숙

  박, 식음료 및 기념품을 제공할 수 있다.'
