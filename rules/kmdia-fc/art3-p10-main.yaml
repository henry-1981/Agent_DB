rule_id: kmdia-fc-art3-p10-main
text: '⑩ “학술대회”라 함은 컨퍼런스, 심포지움, 세미나, 학

  술행사 등 명칭 여하나 진행 형식 등에 관계없이 보건

  의료인들에게 의학 관련 과학적·교육적 정보를 제공함

  으로써 보건의료인들의 의학 연구 또는 교육 등을 지원

  할 목적으로 이루어지는 행사를 말하되, 실질적으로 사

  업자가 주최하는 행사는 제외한다. 이러한 학술대회 중

  “국내 개최 국제학술대회”라 함은 5개국 이상에서 보건

  의료인들이 참석(발표자, 좌장, 토론자가 아닌 청중으로

  참가한 보건의료인들이 5개국 이상에서 내한하여야 한

  다)하거나 회의참가자 중 외국인이 150인 이상이고 2

  일 이상 진행되는 국내에서 개최되는 국제규모의 학술

  대회로서, 「의료법」 제28조 제1항에 따른 의사회ㆍ치

  과의사회ㆍ한의사회 또는 한국의료기기산업협회로부

  터 국제학술대회로 인정받은 학술대회를 말한다. “국제

  학회”라 함은 5개국 이상에서 외국인 정회원 수가 100

  명이상인 학회로서, 「의료법」제28조 제1항에 따른 의

  사회ㆍ치과의사회ㆍ한의사회 또는 한국의료기기산업

  협회로부터 국제학회로 인정받은 학회를 말한다.


  ⑪ “제품설명회”라 함은 사업자가 국내에서 복수의 의

  료기관을 대상으로 해당 의료기관 소속 보건의료인에

  게 자사의 의료기기에 대한 정보제공을 목적으로 주최

  하는 행사와 개별 의료기관을 방문하여 해당 의료기관

  소속 보건의료인에게 자사의 의료기기에 대한 정보를

  제공하는 것을 말한다.


  ⑫ “교육·훈련”이라 함은 사업자가 국내·외에서 보건

  의료인, 시술 및 진단관련 종사자에게 시술 및 진단기

  술의 습득·향상을 위하여 실시하는 행위로서, 의료기

  술 사용과 직접적으로 관련이 있는 정보를 전달하는








































  24                2022 KMDIA 의료기기 리베이트 예방 및 공정거래를 위한 안내서

  의료기기 거래에 관한 공정경쟁규약 및 세부운용기준 개요                25

  나. 의료기관 종사자 (청소, 경비 등 보건의료 서비스

  의 특성과 관련이 없는 일반적인 성격의 업무에 전적

  으로 종사하는 자 제외)'
