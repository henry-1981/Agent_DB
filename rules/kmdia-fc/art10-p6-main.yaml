rule_id: kmdia-fc-art10-p6-main
text: '⑥ 규약 제9조 제3항 제2호와 관련하여 협회는

  1,4,7,10월에 전 분기 학술대회 참가자 지원 내역(학

  술대회명, 학술대회 주최자, 지원 사업자명, 지원총액,

  지원자수, 지원자 소속 의료기관명 등)을 협회 홈페이

  지에 게재한다.'
