rule_id: kmdia-fc-art14-p1-main
text: '① 사업자는 시장조사에 대한 사례로서 사회통념상 허

  용되는 범위 내에서 금품류를 제공할 수 있다. 단, 사

  업자는 시장조사의 실시 내역을 협회에서 정한 양식에

  따라 매분기별로 협회에 신고하여야 한다.'
