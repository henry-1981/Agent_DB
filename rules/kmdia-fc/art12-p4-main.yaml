rule_id: kmdia-fc-art12-p4-main
text: '④ 사업자는 교육·훈련 개최 전 국내 교육·훈련에 참가

  하는 보건의료인, 시술 및 진단 관련 종사자에게 숙박

  을 제공하는 것이 예정된 경우와 국외 교육·훈련을 실

  시하는 경우에는, 해당 교육·훈련 개최 40일 전에 협회

  에서 정한 양식에 따라 구체적인 교육·훈련 개최계획

  서, 소요예산안 등 부속서류를 첨부하여, 협회에 해당

  교육·훈련 개최승인을 신청하여 협회의 사전 승인을 받

  아야 하며, 해당 교육·훈련 종료 후 1개월 이내에 해당

  교육·훈련의 비용결산 내역을 협회에 통보하여야 한다

  (협회는 사업자가 교육·훈련을 적정하게 운영하였는지

  확인하여야 한다). 그 이외에 국내에서 복수 의료기관

  을 대상으로 숙박을 제공하지 않고 실시하는 교육·훈련

  의 경우에는 교육·훈련 개최 1주일 전에 협회에서 정한

  양식에 따라 협회에 신고하여야 한다.

  내역서, 영수증, 보딩패스로 증빙되는 목적지까지의

  이코노미 클래스 국내항공료, KTX, 고속버스 또는 이

  에 준하는 대중교통수단 운임으로 한다.'
