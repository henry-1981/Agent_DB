rule_id: kmdia-fc-art4-p5-main
text: '⑤ 규약 제7조 제1항 제5호에 따라 사업자는 기부금

  품 전달이 완료된 후 10일 이내에 홈페이지를 통하여

  집행신고서를 작성하여 기부 영수증 등의 기부 증빙자

  료를 첨부해서 협회로 제출하여야 한다.'
