rule_id: kmdia-fc-art3-p4-main
text: '④ “판매업자 등”이라 함은 의료기기법 제17조에 의거

  의료기기의 판매업 또는 임대업 신고를 한 후 의료기

  기의 판매업 또는 임대업을 영위하는 자를 말한다.'
