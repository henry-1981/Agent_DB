rule_id: kmdia-fc-art8-p7-main
text: '⑦ 사업자는 보건의료인 및 시술·진단 관련 종사자 모

  임 등에서 필요한 식음료를 지원하기 위한 교육·훈련

  을 개최하여서는 아니된다.'
