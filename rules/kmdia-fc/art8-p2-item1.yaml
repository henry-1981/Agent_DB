rule_id: kmdia-fc-art8-p2-item1
text: '1. 제1항의 기관·단체가 협회에서 정한 양식상에 학술

  대회명, 학술대회개요, 지원요청금액 등을 기재하고

  구체적인 학술대회계획서, 소요예산안 등 부속서류를

  첨부하여 협회에 지원요청을 한다.'
