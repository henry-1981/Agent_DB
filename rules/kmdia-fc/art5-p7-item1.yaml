rule_id: kmdia-fc-art5-p7-item1
text: '1. 제1항의 국내외 학술대회는 학술적ㆍ교육적 목적

  에 부합하는 내용과 방식으로 적절한 장소에서 개최되

  는 학술대회로 한정한다.'
