rule_id: kmdia-fc-art15-p3-main
text: '③ 실무위원의 임기는 1년으로 하되, 연임할 수 있다.

  단, 보궐된 실무위원의 임기는 전임자의 잔여 임기로

  한다.



  44                2022 KMDIA 의료기기 리베이트 예방 및 공정거래를 위한 안내서

  의료기기 거래에 관한 공정경쟁규약 및 세부운용기준 개요                45'
