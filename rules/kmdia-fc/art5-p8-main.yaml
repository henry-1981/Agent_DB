rule_id: kmdia-fc-art5-p8-main
text: '⑧ 제1항의 지원에 있어 부스 임대나 광고를 통한 사

  업자의 자발적인 지원에 대해 사업자별 지원금액의 제

  한이 있는 것은 아니며, 제8조(학술대회 개최·운영 지

  원)와 제7조(기부행위) 또는 제17조(전시·광고)가 경

  합하는 경우 제8조가 우선하여 적용된다.'
