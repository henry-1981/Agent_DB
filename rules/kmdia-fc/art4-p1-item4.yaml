rule_id: kmdia-fc-art4-p1-item4
text: '４. 회비, 기타수입, 수입연구비용의 지출에 관한 재

  무, 회계의 규정을 갖고, 회원 개인 및 회원이 소속하

  는 각 의료기관 등과는 별개로 독립적인 회계규정을

  갖고, 수입은 오로지 연구 활동을 위해서 사용되며 수

  익을 목적으로 하지 않을 것'
