rule_id: kmdia-fc-art6-p5-item1
text: '1. 교통비는 해외에서 개최되는 학술대회 참가의 경우

  목적지까지의 최단거리 이코노미클래스 국제항공 왕

  복운임으로 귀국일자 확정 요금을 적용한다. 국내에서

  개최되는 학술대회 참가의 경우 교통비는 정산 시 여

  정이 적힌 내역서, 영수증, 보딩패스로 증빙되는 목적

  지까지의 이코노미 클래스 국내항공료, KTX, 고속버

  스 또는 이에 준하는 대중교통수단 운임으로 한다.'
