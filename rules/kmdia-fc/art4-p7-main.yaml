rule_id: kmdia-fc-art4-p7-main
text: '⑦ 규약 제7조 제4항의 경우, 사업자는 기부행위 10일

  전에 홈페이지를 통하여 협회에 신고하여야 하며, 기

  부금품 전달이 완료된 후 10일 이내에 홈페이지를 통

  하여 집행신고서를 작성하고 기부 영수증 등의 기부

  증빙자료를 첨부하여 협회에 제출하여야 한다.




  30                2022 KMDIA 의료기기 리베이트 예방 및 공정거래를 위한 안내서

  의료기기 거래에 관한 공정경쟁규약 및 세부운용기준 개요                31

  분의 30 이상을 해당 학술대회 참가자로부터 받는 등

  록비(또는 참가비) 및  해당 학술대회를 주관하는 기

  관·단체의 회원의 회비 등 자기부담으로 충당하는 것

  을 조건으로 사업자의 해당 학술대회 지원을 인정해야

  한다. 학술대회 주관자는 협회가 이러한 조건이 지켜

  졌는지를 확인할 수 있도록 해당 학술대회 종료 후 3

  개월 이내에 해당 학술대회의 비용결산 내역을 협회에

  통보하여야 한다. 협회는 위의 조건이 지켜지지 않거

  나 비용결산 내역을 통보받지 못한 경우에 향후 해당

  학술대회 주관자가 개최하는 학술대회에 대하여 지원

  을 거절할 수 있다.'
