rule_id: kmdia-fc-art11-p2-item3
text: '3. 사업자는 임상활동의 연구계약에 의해 보건의료인

  의 노력에 합당한 범위 내에서 해당 보건의료인이 소

  속된 의료기관 등에 적절한 비용을 지급할 수 있다.'
