rule_id: kmdia-fc-art7-p2-main
text: '② 규약 제10조 제2항 전단의 제품설명회에 참가하는

  보건의료인에게 숙박을 제공하는 것이 예정된 경우,

  사업자는 제품설명회 개최일 40일 전까지 홈페이지를

  통하여 행사프로그램, 예산안 등 서류를 첨부하여 협

  회에 개최 승인을 신청하여야 하고, 해당 제품설명회

  종료 후에는 1개월 이내에 해당 제품설명회의 비용 결

  산내역을 홈페이지를 통하여 행사프로그램, 참석자명

  단, 결산보고서 등 증빙자료를 첨부하여 협회에 제출

  하여야 한다.'
