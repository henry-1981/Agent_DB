rule_id: kmdia-fc-art4-p4-item3
text: '3. 협회는 모집공고 시 의학·의료기기 연구기관 등으

  로부터 구체적인 사업계획서(연구계획서)와 지출항목

  및 비용이 적힌 예산서 등의 자료를 제출받아, 사업내

  용이 규약 제7조 제1항의 원칙에 부합하는지 여부, 사

  업자의 기부목적 등을 검토하여 기부대상을 선정한다.'
