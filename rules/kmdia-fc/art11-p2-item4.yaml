rule_id: kmdia-fc-art11-p2-item4
text: '4. 사업자는 연구계약을 맺은 의료기관 등으로부터 해

  당 연구에 대한 결과보고서를 확보하여 관련 비용의

  회계처리 시 이를 첨부하여야 한다.'
