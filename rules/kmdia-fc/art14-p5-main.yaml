rule_id: kmdia-fc-art14-p5-main
text: '⑤ 규약 제12조 제2항에 따라 사업자는 보건의료인에

  게 강연료 또는 자문료를 지급한 경우, 증빙자료를 구

  비하여 홈페이지를 통하여 지급일 기준 20일 이내에

  협회에 신고하여야 한다.'
