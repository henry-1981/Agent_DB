rule_id: kmdia-fc-art17-p5-main
text: '⑤ 위원회는 비회원사가 규약을 위반한 사실이 신고

  또는 적발되는 경우에는 이를 공정거래위원회 또는 보

  건복지부에 통보할 수 있다.'
