rule_id: kmdia-fc-art2-p1-item2
text: '2. 보건의료서비스에 종사하는 것이 허용된 자

  가. 의료기관 개설자(법인의 대표자나 이사, 그 밖에

  이에 종사하는 자를 포함),


  26                2022 KMDIA 의료기기 리베이트 예방 및 공정거래를 위한 안내서

  의료기기 거래에 관한 공정경쟁규약 및 세부운용기준 개요                27

  나. 사업자가 의료기기에 대한 채택 등 거래에 대한 영

  향을 고려하여 의학·의료기기 연구기관 등의 기부요청

  에 응하는 경우

  다. 사회통념상 의학·의료기기 연구기관 등이 자신의

  부담으로 지불해야 하는 것으로 인정되는 부동산·비품

  구입, 시설증·개축, 경영자금보전 등에 사용되는 자금

  에 충당되는 경우

  라. 정당한 이유없이 동일한 의학·의료기기 연구기관

  등에 반복적·지속적으로 기부금품을 제공하는 경우'
