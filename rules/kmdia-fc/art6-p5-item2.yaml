rule_id: kmdia-fc-art6-p5-item2
text: '2. 등록비는 사전등록이 원칙이며, 비용으로 송금한

  날짜 기준환율을 적용한 한화 금액 또는 신용카드 청

  구영수증의 금액을 적용한다.'
