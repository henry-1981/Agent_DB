rule_id: kmdia-fc-art2-p1-item3
text: '3. 제2호에도 불구하고, 사업자는 의학·의료기기 연구

  기관 등이 협회에 학술상 시상, 캠페인 등 사업(다만

  사무국이 국내 소재의 국제학회의 경우 제1호 다.목에

  도 불구하고 사무국 운영지원비를 포함한다)을 실시하

  기 위해 기부를 요청하는 경우 다음 각 목의 절차에 따

  라 기부대상에 직접 기부한다.

  가. 의학·의료기기 연구기관 등이 협회에서 정한 양식

  상에 사업명, 사업개요, 기부요청금액 등을 기재하고

  구체적인 사업계획서, 소요예산안 등 부속서류를 첨부

  하여 협회에 기부요청을 한다.

  나. 협회는 사업계획의 적정성을 검토하여 그 검토결

  과에 따라 공지를 통해 기부를 희망하는 사업자를 모

  집하고 모집결과를 해당 기부대상 및 기부할 사업자에

  게 통지한다.

  다. 사업자는 협회의 통지에 따라 기부대상인 해당 의

  학·의료기기 연구기관 등에 직접 기부한다.


  서에 “인체사용금지” 또는 그 밖에 환자에 대하여 사용

  이 금지된다는 사항을 표기하여 제공하여야 한다.'
