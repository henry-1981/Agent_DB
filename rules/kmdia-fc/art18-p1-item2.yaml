rule_id: kmdia-fc-art18-p1-item2
text: '2. 다음 각 목에 해당하는 사항

  가. 제7조 제2항에 의한 기부대상의 선정, 같은 조 제

  3항에 의한 의료기관 등이 기부 요청한 사업계획의 적

  정성 여부 및 기부대상사업자의 선정, 같은 조 제2항

  내지 제4항에 의한 기부행위의 적정성 여부

  나. 제8조 제2항에 의한 국내학술대회계획의 적정성

  여부 및 학술대회 지원 희망사업자의 지원 가부, 같은

  조 제3항에 의한 학술대회 지원조건 준수 여부, 같은

  조 제4항에 의한 학술대회 지원의 적정성 여부

  다. 제10조 제2항에 의한 제품설명회 및 제11조에 의

  한 교육·훈련의 개최 승인 및 실시의 적정성 여부'
