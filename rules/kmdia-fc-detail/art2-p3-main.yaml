rule_id: kmdia-fc-detail-art2-p3-main
text: '③ 규약 제5조 제3항 제2호의 규정은 사업자가 판매상이나 마케팅 대행사가 의료기관 등 또는 보건의료인에게 제공하는 것임을 알았거나 알
  수 있었음에도 중대한 과실로 알지 못하고 판매상이나 마케팅대행사에게 그 금품류를 제공하는 경우를 말한다.

  '
