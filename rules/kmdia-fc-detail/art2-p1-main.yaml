rule_id: kmdia-fc-detail-art2-p1-main
text: "제2조 (금품류 제공의 제한)\n① 규약 제5조 제1항에 정한 금품류 제공이 제한되는 \"보건의료인\"은 규약 제3조 제6항에 의한 \"\
  보건의료인\"으로서, 다음 각 호에 해당하는 경우를 말한다.\n1. 보건의료 관계법령에서 자격 또는 면허를 정한 보건의료인\n  가. 의료법:\
  \ 의사, 치과의사, 한의사, 조산사, 간호사\n  나. 의료기사등에관한법률: 임상병리사, 방사선사, 물리치료사, 작업 치료사, 치과기공사 및\
  \ 치과위생사, 의무기록사, 안경사\n  다. 기타 법률: 위생사, 1급 및 2급 응급구조사, 의지보조기기사, 보건교육사, 의료보사, 간호조무사,\
  \ 접골사, 침사 및 구사, 병원에 근무하는 약사 및 한약사\n  라. 나목 내지 다목에 의한 보건의료인은 의료기관의 개설자 또는 종사자인 경우에\
  \ 한한다.\n2. 보건의료서비스에 종사하는 것이 허용된 자\n  가. 의료기관 개설자(법인의 대표자나 이사, 그 밖에 이에 종사하는 자를 포함).\n\
  \  나. 의료기관 종사자 (청소, 경비 등 보건의료 서비스의 특성과 관련이 없는 일반적인 성격의 업무에 전적으로 종사하는 자 제외)\n"
