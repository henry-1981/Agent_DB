rule_id: kmdia-fc-detail-art3-p2-main
text: '② 사업자 및 판매업자 등은 규약 제6조 제2항에 따른 시연용 제품 및 평가용 제품은 의료기관(제공되는 해당 견본품에 대한 평가가 필요하다고
  인정되는 치료과목별에 한함)에 대하여 최소포장단위로 1~2개 또는 평가에 필요한 최소 수량을 제공할 수 있다.

  '
