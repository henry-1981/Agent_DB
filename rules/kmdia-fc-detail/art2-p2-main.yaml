rule_id: kmdia-fc-detail-art2-p2-main
text: '② 규약 제5조 제3항 제1호에서 "사업자의 국내외 본사, 지사나 그 관계사가 의료기관 등 또는 보건의료인에게 금품류를 제공한 경우"라
  함은, 사업자가 사업자의 국내외 본사, 지사나 그 관계사에게 금품류를 제공하면서 이를 의료기관 등 또는 보건의료인에게 제공하도록 요구하는 경우
  또는 사업자가 사업자의 국내의 본사, 지사나 그 관계사가 단독으로 의료기관 등 또는 보건의료인에게 금품류를 제공하는 것을 알았거나 알 수 있었음에도
  고의 또는 중대한 과실로 이를 방지하지 아니한 경우를 말한다.

  '
